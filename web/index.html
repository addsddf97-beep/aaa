<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Portfolio & Chatroom</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="stile.css">
</head>
<body>
    <div class="split-layout">
        <aside class="left-panel">
            <div class="brand-profile">
                <h1 id="brand-title" class="theme-all">Portfolio Archive</h1>
                <div class="profile-name">이은 <span class="profile-title">AI Researcher</span></div>
                <p class="subtitle">개인 프로젝트, 기술 스택 및 종합 커리어 히스토리</p>
                <div class="mode-switch-wrapper">
                    <label class="theme-switch">
                        <input type="checkbox" id="darkmode-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div id="chatbot-widget" class="chatbot-container"></div>
        </aside>
        <main class="right-panel">
            <section id="portfolio-section">
                <div class="section-header">
                    <h2>Career Timeline</h2>
                    <p class="section-desc">필터를 선택하고 항목을 클릭하면 상세 내용을 볼 수 있습니다.</p>
                </div>
                <nav class="timeline-filters">
                    <button class="filter-btn active" data-filter="all">전체보기</button>
                    <button class="filter-btn" data-filter="project">프로젝트</button>
                    <button class="filter-btn" data-filter="experience">대외활동</button>
                    <button class="filter-btn" data-filter="education">학력·교육</button>
                    <button class="filter-btn" data-filter="skill">기술스택</button>
                    <button class="filter-btn" data-filter="award">수상경력</button>
                </nav>
                <div id="projects-grid" class="projects-timeline">
                    <p class="loading">이력 데이터를 로드하는 중...</p>
                </div>
            </section>
            <footer><p>&copy; 2026 Portfolio Archive. All rights reserved.</p></footer>
        </main>
    </div>
    <div id="detail-modal" class="modal-overlay">
        <div class="modal-content">
            <button id="modal-close" class="modal-close-btn">&times;</button>
            <div class="modal-header">
                <span id="modal-type" class="type-badge">Project</span>
                <span id="modal-year" class="item-period">2026</span>
            </div>
            <h3 id="modal-title">제목</h3>
            <div id="modal-tags" class="tags"></div>
            <div class="modal-body"><p id="modal-description">상세 내용 설명입니다.</p></div>
            <div class="modal-footer"><a id="modal-link" href="#" target="_blank" class="project-link">자세히 보기</a></div>
        </div>
    </div>
    <script src="app.js"></script>
    <script src="widget.js"></script>
</body>
</html>
